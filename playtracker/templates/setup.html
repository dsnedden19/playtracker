<link rel="stylesheet" href="/static/style.css">

<div class="container">
    <h2>Game Setup</h2>

    <form method="POST">

        <label>Opponent:</label><br>
        <input type="text" name="opponent"
               style="width: 80%; max-width: 400px; padding: 12px; font-size: 20px; margin: 10px 0;"><br><br>

        <label>Date:</label><br>
        <input type="date" name="date"
               style="width: 80%; max-width: 400px; padding: 12px; font-size: 20px; margin: 10px 0;"><br><br>

        <label>Home or Away:</label><br>
        <select name="homeaway"
                style="width: 80%; max-width: 400px; padding: 12px; font-size: 20px; margin: 10px 0;">
            <option value="Home">Home</option>
            <option value="Away">Away</option>
        </select><br><br>

        <button type="submit" class="button" style="background-color: #0074D9;">
            Start Game
        </button>
    </form>

    <a href="/" class="button" style="background-color: gray;">Back to Home</a>
</div>
